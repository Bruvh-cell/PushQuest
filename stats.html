<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stats - PushQuest</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="navbar">
    <div class="logo">PushQuest</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="daily.html">Daily Challenge</a>
      <a href="pushTree.html">Skills</a>
      <a href="stats.html">Stats</a>
      <a href="additionalInfo.html">Extra</a>
    </div>
  </div>

  <div class="container stats-page">
    <h1>Your Stats</h1>

    <div class="stat-box">
      <p><strong>Level:</strong> <span id="user-level">1</span></p>
      <p><strong>EXP:</strong> <span id="user-exp">30</span> / 100</p>
    </div>

    <section class="workout-log">
      <h2>Workout Log</h2>
      <textarea id="workout-input" rows="4" placeholder="Write your workout here..."></textarea>
      <br />
      <button id="submit-workout">Submit Workout</button>

      <h3>Previous Workouts</h3>
      <ul id="workout-list"></ul>
    </section>
    
    <div class="completed-dailies-button">
      <button onclick="window.location.href='completedDailies.html'">View Completed Dailies</button>
    </div>

    

    <div class="unlocked-skills">
      <h2>Unlocked Skills</h2>
      <ul id="skill-list">
        <li>Knee Push-Ups</li>
        <li>Push-Ups</li>
        <li>Sit-ups</li>
        <li>Plank</li>
      </ul>
    </div>
  </div>
  <script src="workoutLog.js"></script>
  <script src="playerData.js"></script>
  <script src="stats.js"></script>
</body>
</html>
